<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Investigators Training System</title>
  <style>
    :root {
      --branch-yellow: #facc15;
      --bg: #0f172a;
      --card: #1e293b;
      --text: #e2e8f0;
    }

    body { font-family: Arial, sans-serif; margin: 0; background:var(--bg); color:var(--text); }
    .container { max-width: 900px; margin: auto; padding: 20px; }
    .card { background:var(--card); padding:20px; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,.4); }
    button { padding:10px 16px; border:none; border-radius:8px; cursor:pointer; margin:8px 8px 0 0; }
    .btn { background:var(--branch-yellow); color:#000; font-weight:bold; }
    .btn:disabled { background:#64748b; color:#fff; }
    .option { padding:10px; margin:8px 0; background:#334155; border-radius:8px; cursor:pointer; }
    .option.correct { background:#16a34a; }
    .option.wrong { background:#dc2626; }
    .dropzone { border:2px dashed #94a3b8; padding:20px; margin-top:10px; min-height:50px; }
    .draggable { padding:10px; background:#38bdf8; margin:5px; border-radius:6px; cursor:grab; display:inline-block; }
    .certificate { text-align:center; border:2px solid var(--branch-yellow); padding:20px; border-radius:12px; }
    img { width:100%; border-radius:10px; }
    .image-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin: 10px 0; }
    .footnote { font-size:12px; opacity:0.6; text-align:center; margin-top:10px; }
    .title-banner { color:var(--branch-yellow); font-weight:bold; font-size:18px; margin-bottom:10px; }
    .hidden-counter { font-size: 10px; opacity: 0.15; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <div id="app" class="card"></div>
    <div class="footnote">Created by veg_soup</div>
  </div>

<script>
const trainings = [
  {
    title: "Intro to Law",
    sections: [
      { type: "slide", title: "Welcome", content: `Welcome to your Introduction to Law training.\n\nThis training will consist of explanations and a few follow up questions to check for understanding. You cannot fail this training. Keep trying each question until you get it right but don't try to brute force it; this is your chance to learn and the info taught in this training will be quizzed in the Investigators Assessment.\n\nIf you have any questions at all about any of the content covered in this training, feel free to ask a High Rank.\n\nMake sure to follow each step carefully.`},
      { type: "slide", title: "The Jedi Codex", content: `This section will cover the Jedi Codex; a legal document containing all laws of the Order and serves as one of the fundamental documents used by Investigators.\n\nPlease open the Jedi Codex now. A link to it can be found in the faq channel in the Investigators Discord server.\n\nHead to the next page when ready.`},
      { type: "slide", title: "The Jedi Codex", content: `The Codex is split into four sections: Procedure, Summary of General Provisisions, General Provisions, and the Table of Penalties.\n\nA useful trick that you can use to navigate the Codex quickly is to use the Ctrl + F keybind to open the search menu. This allows you to plug in keywords, allowing you to more easily find laws/crimes.`},
      { type: "quiz", questions: [
        { type: "mc", question: "What are the four sections of the Jedi Codex?", options:["Procedure, General Provisions, Punishments, Laws","Summary of General Provisisions, General Provisions, Mod Guide, and the Table of Penalties","Procedure, Summary of General Provisisions, General Provisions, and the Table of Penalties","Procedure, Summary of General Provisisions, Detention Protocol, and the Table of Penalties"], answer:2 },
        { type: "mc", question: "What is the keybind to quickly search for laws and crimes?", options:["Ctrl + F","Ctrl + S","Ctrl + C", "F1"], answer:0 },
      ]},
      { type: "slide", title: "Section 1: Procedure", content: `Section I is split into 4 sub-sections, starting with Jurisdiction.\n\nThe Jurisdiction sub-section states that that no act committed outside of  Order games, Order affiliated platforms or in personal communications outside of Order-related organizations may be considered an offence.\n\nIt also acknowleges that the Jedi High Council is the primary Judicial body of the order, and that no person shall be convicted of an offence that is not otherwise specified in this enactment or future enactments.`},
      { type: "slide", title: "Section 1: Procedure", content: `The second sub-section is Punishment.\n\nThis sub-section recognizes that the Jedi High Council may determine the punishment for any crime, so long that it remains lawful and fair.\n\n\nThe third sub-section is Duress, Ignorance, and Necesity.\n\nThis protects people who commit an offense under duress, states that ignorance does not mean you are excused from an offense, and assures that those who commit an offense to protect themselves or others is protected from criminal responsibility.`},
      { type: "slide", title: "Section 1: Procedure", content: `The fourth and final sub-section of Section I of the Jedi Codex is Party(ies) to offenses.\n\nThis states that anyone who encourages someone else to commit a crime will be held criminally responsible.\n\nIt also states that anyone who conspires to commit a crime shall be considered to have committed that crime, regardless if they went through with it or not.`},
      { type: "quiz", questions: [
        { type: "mc", question: "Does ignorance mean you are excused from responsibility or punishment?", options:["Yes","No"], answer:1 }
      ]},
      { type: "slide", title: "Section 2: Summary of General Provisisions", content: `Section II goes over each law and gives a brief overview. Please take note and pay close attention to these.\n\nLaw of Articulation - Protects freedom of speech and defines its limitations.\n\nLaw of Preservation - Maintains the integrity and fair functioning of the game.\n\nLaw of Honour - Governs combat-related conduct and fair play in engagements.\n\nLaw of Quarters - Defines spatial jurisdictions, area-based restrictions, and attire regulations.\n\nLaw of Wisdom - Regulates training sessions, tryouts, and official events.\n\nLaw of Reverence - Governs hierarchical authority and respect for rank and positio\n\nLaw of Adherence - Governs conduct surrounding Temple Guards\n\nLaw of Justice - Addresses the abuse of power and authority within the Order.`},
      { type: "quiz", questions: [
        { type: "mc", question: "Which law governs combat-related conduct and fair play?", options:["Law of Reverence","Law of Adherence","Law of Honour","Law of Justice"], answer:2 }
      ]},
      { type: "slide", title: "Section 3: General Provisions", content: `Section III contains the full set of laws that govern behaviour within the Jedi Order.\n\nEach law defines specific crimes and expectations.\n\nYou are NOT expected to memorize everything right now, focus on understanding what each law covers.\n\nUse Ctrl + F to find specific crimes when needed.`},
      { type: "slide", title: "Law of Articulation", content: `This law protects expression while defining its limits.\n\nKey Crimes:\n- Suppression of Expression: Preventing someone from speaking without valid reason (e.g., muting or shutting them down unfairly)\n- Doxxing: Sharing private info like real name, location, or personal accounts\n- Extortion: Threatening to expose information to control someone\n- Harassment: Repeated insults, threats, or discriminatory remarks or promoting self-harm, suicide, or violence\n- Indecency: NSFW, sexual, or inappropriate content\n- Impersonation: Pretending to be another player or rank\n- Defamation: Spreading false or damaging claims\n- Recruitment: Advertising external groups without permission`},
      { type: "quiz", questions: [
        { type: "mc", question: "If I pretend to be the Master of the Order, what crime am I committing?", options:["Impersonation","Doxxing","Defamation","Harassment"], answer:0 }
      ]},
      { type: "slide", title: "Law of Preservation", content: `This law maintains fairness and proper game function.\n\nKey Crimes:\n- Disturbing the Peace: Causing disorder or abusing loopholes in rules\n- Usage of an Alternative Account: Using alts without approval to bypass rules or punishment\n- Cheating/Hacking: Using scripts, exploits, or third-party tools for advantage\n- Glitching: Abusing bugs or unintended mechanics\n- Unauthorized Team Change: Joining restricted teams without permission\n- Force Point Exploitation: AFK farming or using macros to gain points\n- Obstruction of Identification: Hiding or covering your username\n- Moderation Interference: Interrupting or crowding active moderation scenes`},
      { type: "quiz", questions: [
        { type: "mc", question: "If I hide my username, what crime am I committing?", options:["Glitching","Obstruction of Identification","Force Point Exploitation","Usage of an Alternative Account"], answer:1 },
        { type: "mc", question: "If I crowd an active moderation scene, what crime am I committing?", options:["Disturbing the Peace","Cheating/Hacking","Moderation Interference","Unauthorized Team Change"], answer:2 }
      ]},
      { type: "slide", title: "Law of Honour", content: `This law governs combat and fair play.\n\nKey Crimes:\n- Murder: Killing protected players (Jedi/Visitors) without valid reason\n- Assault: Damaging or attacking protected players\n- Abuse of Protected Status: Using immunity to interfere in fights\n- Abuse of Protected Individual(s): Hiding behind protected individuals during combat\n- Evasion of Combat: Running away or refusing to engage properly (spamming blocks/dashes to avoid fighting)\n- Line-baiting: Attacking across safe zones without committing\n- Combat Healing: Healing someone still actively fighting (unless exempt)`},
      { type: "quiz", questions: [
        { type: "mc", question: "If I attack over the white line at the front of the temple, what crime am I committing?", options:["Murder","Abuse of Protected Status","Combat Healing","Line-baiting"], answer:3 },
        { type: "mc", question: "If spam dashes and blocks to run away from a Sith, what crime am I committing?", options:["Assault","Evasion of Combat","Abuse of Protected Individual(s)","Combat Healing"], answer:1 }
      ]},
      { type: "slide", title: "Law of Quarters", content: `This law defines areas and permissions.\n\nKey Crimes:\n- Jurisdiction Breach: Ignoring orders from authority in controlled areas\n- Trespass: Entering restricted rooms/areas (e.g., Council Chambers, TG Dojo)\n- Spawn Killing: Attacking players before they can react after spawning\n- Misconduct: Using sabers or force where prohibited (e.g., Archives)\n- Unauthorized Representation: Wearing division uniforms/accessories you don’t belong to`},
      { type: "quiz", questions: [
        { type: "mc", question: "If I go past the yellow line at the front of the temple as a Jedi Initiate, what crime am I committing?", options:["Trespass","Jurisdiction Breach", "Misconduct","Unauthorized Representation"], answer:0 }
      ]},
      { type: "slide", title: "Law of Wisdom", content: `This law governs trainings, events, and progression.\n\nKey Crimes:\n- Crystal Misusage: Obtaining or deleting crystals improperly\n- Obstruction of Events: Interrupting trainings, tryouts, or trials\n- Attendee Misconduct: Disrespecting hosts or disrupting sessions\n- Host Misconduct: Hosting without permission or abusing authority\n- Fraud: Falsifying logs, applications, or records\n- Inappropriate Solicitation: Repeatedly begging for trainings, ranks, or permissions`},
      { type: "quiz", questions: [
        { type: "mc", question: "If I repeatedly beg to be ranked up, what crime am I committing?", options:["Inappropriate Solicitation", "Crystal Misusage","Attendee Misconduct","Obstruction of Events"], answer:0 }
      ]},
      { type: "slide", title: "Law of Reverence", content: `This law enforces respect for authority and structure.\n\nKey Crimes:\n- Treason: Acting to disrupt or weaken the Order or assisting enemies\n- Insubordination: Refusing lawful orders from superiors or following unlawful orders\n- Document Tampering: Editing or destroying official records without permission`},
      { type: "quiz", questions: [
        { type: "mc", question: "If I ignore lawful orders from a moderator (JM+, Investigator MR+, TG MR+), what crime am I committing?", options:["Treason","Insubordination","Document Tampering"], answer:1 }
      ]},
      { type: "slide", title: "Law of Adherence", content: `This law governs Temple Guardians and security.\n\nKey Crimes:\n- Disruption of TG Posts: Interfering with on-duty Temple Guardians\n- Disruptive Communication with TG: Talking to TGs without valid reason\n- Disclosure of TG Identity: Exposing hidden usernames\n- Unauthorized Command of TG: Giving orders to TGs without authority\n- Combat Interference: Interrupting duels involving TGs or JTF\n- Killzone Violation: Entering restricted combat/security zones`},
      { type: "quiz", questions: [
        { type: "mc", question: "If I talk to an on-duty TG for no reason, what crime am I committing?", options:["Disruption of TG Posts","Killzone Violation","Unauthorized Command of TG","Disruptive Communication with TG"], answer:3 },
        { type: "mc", question: "If I leak the name of an on-duty TG (with helmet on), what crime am I committing?", options:["Unauthorized Command of TG","Disruption of TG Posts","Combat Interference","Disclosure of TG Identity"], answer:3 }
      ]},
      { type: "slide", title: "Law of Justice", content: `This law governs fairness and abuse of power.\n\nKey Crimes:\n- Judicial Corruption: Bias, favoritism, or abusing legal authority\n- Non-Judicial Corruption: Using rank for personal gain\n- Abuse of Power: Acting outside your authority or misusing rank\n- Office Accumulation: Holding multiple high-ranking positions without permission from JHC\n- Perjury: Lying or withholding truth in investigations\n- Obstruction of Justice: Interfering with investigations or evidence\n- Evading Arrest: Running, leaving, or avoiding punishment\n- Unlawful Detention: Arresting without reason or authority\n- Legal Protection Violations: Denying fair trial or due process`},
      { type: "quiz", questions: [
        { type: "mc", question: "If I leave the game to evade a moderator, what crime am I committing?", options:["Unlawful Detention","Legal Protection Violations","Evading Arrest","Perjury"], answer:2 }
      ]},
      { type: "slide", title: "Table of Penalties", content: `Now we will review the Table of Penalties.\n\nThis document serves as a guide for punishing offenders based on the severity of the crime and how many times it has been committed.\n\nPlease open the Table of Penalties now. A link to it can be found in the faq channel in the Investigators Discord server.\n\nHead to the next page when ready.`},
      { type: "slide", title: "Table of Penalties", content: `In the Table of Penalties, each crime is sorted by law into sections.\n\nThe subject column determines who the crime applies to.\n\nThe example column provides a few scenarios where a specific crime is being committed. These are just examples and don't cover every scenario.\n\nThe class column can be ignored as it isn't used often.\n\nThe last few columns display the punishment for each subsequent law violation.\n\nIf you have anymore questions about the Table of Penalties (or anything else), contact a High Rank.`},
      { type: "quiz", questions: [
        { type: "mc", question: "What is the punishment for Line-Baiting II first offense?", options:["10m Jail-time","Warning","Server Ban", "20m Jail-time"], answer:1 },
        { type: "mc", question: "What is the punishment for Disruption of TG Post third offense?", options:["Warning","Server Ban","10m Jail-time","20m Jail-time"], answer:3 },
        { type: "mc", question: "What is the punishment for Usage of an Alternative Account first offense?", options:["30m Jail-time","Server Ban","Global Ban","Warning"], answer:2 },
      ]},
      { type: "slide", title: "Edicts", content: `We will conclude with Edicts.\n\nEdicts serve as legal decrees that should be enforced with the same standards as the Laws found in the Jedi Codex.\n\nEdicts can be found in the Edicts channel under the Official Announcements category in the main TJO Discord.\n\nPlease head to that channel now and open up the post named “D-2025-001-A1, KoS Protocol”.\n\nHead to the next page when ready.`},
      { type: "slide", title: "Edicts", content: `Each edict is enforceable under a specific law and clause. The specific law and clause that should be used can be found under the Enforcement section within each edict.\n\nPlease read through the KoS Protocol Edict and head to the next page once you have a basic understanding of the edict.`},
      { type: "quiz", questions: [
        { type: "mc", question: "I will now be asking you a few questions about the KoS Protocol Edict to ensure that you know where to look for information.\n\nUnder which law and clause is the KoS Protocol edict enforceable?", options:["Section I, Law of Adherence, Clause IV","Section II, Law of Reverence, Clause V","Section II, Law of Preservation, Clause V","Section II, Law of Reverence, Clause III"], answer:1 },
        { type: "mc", question: "What is the minimum rank required to follow the KoS Protocol?", options:["Jedi Initiate","Jedi Knight","Padawan Learner","All Jedi"], answer:0},
        { type: "mc", question: "Which of these are exempt from the KoS Protcol Edict?", options:["Jedi Masters","Jedi who are talking to others","Jedi Investigators","Sith or Hostile individuals actively engaged in combat with two or more members of the Jedi Order"], answer:3},
      ]},
      { type: "slide", title:"Conclusion", content: "Thank you for attending this training. This is the conclusion of your Introduction to Law training.\n\nIf you have any questions, feel free to ask in the Discord.\n\nHead to the next page to obtain your Certificate of Completion. Make sure to screenshot it and save the photo for later as it will be used as proof for rank up requirements." }
    ]
  },
  {
    title: "Intro to Conduct",
    sections: [
      { type: "slide", title: "Welcome", content: `Welcome to your Introduction to Conduct training.\n\nThis training will consist of explanations and a few follow up questions to check for understanding. You cannot fail this training. Keep trying each question until you get it right but don't try to brute force it; this is your chance to learn and the info taught in this training will be quizzed in the Investigators Assessment.\n\nIf you have any questions at all about any of the content covered in this training, feel free to ask a High Rank.\n\nMake sure to follow each step carefully.`},
      { type: "slide", title: "Principles of JI", content: `Punishment is never the goal of JI. Our purpose is to improve the overall quality of the game by helping players understand the rules and preventing disruptive behaviour.\n\nWe achieve this in two primary ways:\n\n - Education: teaching and explaining rules to players who may be unaware of them. This always takes priority.\n - Enforcement: addressing players who repeatedly or intentionally disrupt the experience.\n\nNew players who accidentally break a rule they could not reasonably be expected to know (they aren't expected to have read a 20 page document just after joining the game) should not be treated as malicious offenders.\n\nThe objective of JI is to guide and correct behaviour, not to act as judge, jury, and executioner.`},
      { type: "slide", title: "Principles of JI", content: `When handling an incident, please:\n\n - Check the player’s join date, rank, and previous warnings.\n - Consider the context and intent behind the action.\n - Remain polite, patient, and welcoming at all times.\n - Clearly explain what rule was broken and what they should do differently.\n - Be friendly. We are all players here; this is a community and we are all equals.\n\nFor minor, non-serious infractions where the player understands the mistake, a verbal warning is fine.`},
      { type: "slide", title: "Principles of JI", content: `We are here to improve the player experience, not ruin it.\n\nFor example, punishing a new player who accidentally crosses the yellow line or makes a basic mistake can create a negative first impression and make them quit.\n\nThere is a clear difference between:\n\n - Intentional, repeated disruptive behaviour (e.g., spawn camping, mass killing), and\n - Honest mistakes made by new or uninformed players.\n\nPlease apply judgement appropriately and consider the full situation before taking action. While the Table of Penalties should still be followed, moderators are expected to use their brains and exercise common sense.\n\nIf any of your moderation actions are consistently found to be negatively impacting player experience, corrective action may be taken.\n\nOur goal is simple: protect the integrity of the game while keeping it welcoming for new and existing players alike.`},
      { type: "quiz", questions: [
        { type: "mc", question: "What is the purpose of JI?", options:["To punish law breakers.","To improve the overall quality of the game by helping players understand the rules and preventing disruptive behaviour.","To abuse our powers.","To arrest anyone who acts against the Order or commits a crime."], answer:1 },
        { type: "mc", question: "What is the main way we do this?", options:["Arrest rule breakers and giving them warnings.","Yelling at law breakers in VC.","Teaching and explaining rules to players who may be unaware of them. Growth and learning above all.","Banning rule breakers."], answer:2 }
      ]},
      { type: "slide", title: "Investigators Handbook", content: `This section will cover the Investigator Handbook; a divisional document containing all conducts, policies, commands, and more. It serves as one of the fundamental documents used by Investigators.\n\nPlease open the Handbook now. A link to it can be found in the faq channel in the Investigators Discord server.\n\nHead to the next page when ready.`},
      { type: "slide", title: "Investigators Handbook", content: `The Handbook is split into many sections: Policies, Conduct, Training & Events, Rank Structure, Formations & Commands, Moderations Guidelines, and Investigators Medals.`},
      { type: "slide", title: "Conduct", content: `We will first discuss Training Conduct which are the standards you are held to while attending a training.\n\n - Attendees are to request permission to speak, go AFK, or be dismissed. The request should be written out in full; the only acronym allowed to be used is AFK to denote Away From Keyboard. The request should be addressed towards the host, as these permissions will only be granted by the host.\n\n - Attendees are expected to use proper grammar and demonstrate maturity during the training.\n\n - Attendees are to behave and cause no disruption throughout the training.\n\n - Attendees must refer to the host, co-host, and supervisors by their title rather than by name throughout the training.`},
      { type: "quiz", questions: [
        { type: "mc", question: "Do attendees need to request permission to speak, go AFK, or be dismissed?", options:["Yes","No"], answer:0 },
        { type: "mc", question: "Do requests need to be written out in full with no acronyms except AFK?", options:["No","Yes"], answer:1 }
      ]},
      { type: "slide", title: "Conduct", content: `Next, we will discuss On-Duty Conduct which are the standards you are held to while on duty and in public communication server channels.\n\n - A Jedi Investigator must use proper grammar at all times in public chat channels.\n\n - A Jedi Investigator must actively attend to the duties assigned to their rank.\n\n - A Jedi Investigator must always follow the moderation guidelines.\n\n - A Jedi Investigator must always comply with all of the Order’s Laws.\n\n - A Jedi Investigator must remain mature and professional in all circumstances.\n\n - A Jedi Investigator must follow the chain of command at all times.`},
      { type: "quiz", questions: [
        { type: "mc", question: "What must an Investigator always do while talking in public chat channels?", options:["Use emojis.","Refer to people by their rank.","Not talk.","Use grammar."], answer:3 },
        { type: "mc", question: "Should an Investigator remain mature and professional?", options:["Yes","No"], answer:0 }
      ]},
      { type: "slide", title: "Conduct", content: `Finally, we will discuss Ticket Conduct. When handling a ticket in the support hub, all Jedi Investigators are expected to adhere to the following:\n\n - A Jedi Investigator should never speak on a ticket that is already being handled without good reason or when they are affiliated with the accuser or the accused.\n\n - A Jedi Investigator must follow these 4 steps when handling tickets:\n\n1. Ensure the user who submitted the ticket has provided their Roblox Username, the Suspect’s Roblox Username, the Suspected Crime, a Summary of Events, and Relevant Evidence\n\n2. Should there be insufficient evidence, request more evidence or witnesses from the user. If sufficient evidence is not provided, the ticket can be concluded and closed.\n\n3. If necessary, conduct any witness interviews and collect necessary statements. Maintain a log of such information.\n\n4. If there is sufficient evidence of the accused crime, issue a punishment per the punishment or arrest guidelines.\n\n - The ability to speak in tickets will be given to individuals who have reached the rank of Investigator.\n\n - If you are ever unsure of how to handle a situation, always contact a higher-ranking member and ask for guidance.`},
      { type: "quiz", questions: [
        { type: "mc", question: "What information is required in a ticket?", options:["Roblox Username, the Suspect’s Roblox Username, the Law Broken, a Summary of Events, and Relevant Evidence","Roblox Username, the Suspected Crime, a Summary of Events, and Relevant Evidence","Roblox Username, the Suspect’s Roblox Username, the Suspected Crime, a Summary of Events, and Relevant Evidence","Roblox Username, the Suspect’s Roblox Username, the Suspected Crime, and Relevant Evidence"], answer:2 },
        { type: "mc", question: "What should you do if you are unsure of how to handle a situation?", options:["Just freestyle it.","Contact a higher-ranking member and ask for guidance.","Ask a friend for their opinion.","Let them go with a warning and then deal with the situation later."], answer:1 },
      ]},
      { type: "slide", title: "The New Member Policy", content: `We will now move on to our policies.\n\nThe New Member Policy states that as a new member of the institution, you are subject to a 14-day probationary period. This means you may be removed for any reason.\n\nThis policy also states that recruits are not given Roblox group and in-game team access until they reach the rank of novus.\n\nMoreover, you are not allowed to request an Inactivity Notice until you reach the rank of monitor.\n\nFinally, this policy states that all novi must join the Support Hub server.`},
      { type: "slide", title: "Advancement Policy", content: `Moving on to the Advancement Policy. This policy states the amount of time a Low Rank has to rank up.\n\nRecruits have 7 days to rank up to novus. Novi have 21 days to rank up to Investigator.\n\nPlease note that if a monitor goes on IN, their timer to rank up is paused until they return from IN.\n\n(Deadlines to rank up are currently waived and are not in effect)`},
      { type: "quiz", questions: [
        { type: "mc", question: "When do you gain access to the in-game team/group?", options:["Recruit","Investigator","Novus","Monitor"], answer:2 },
        { type: "mc", question: "How many days does a recruit have to rank up?", options:["21","14","5","7"], answer:3 }
      ]},
      { type: "slide", title: "Quota Policy", content: `Moving on to your weekly quota. As recruits, your only goal is to complete the requirements for the novus rank. However, you can see the number of weekly events and the number of hours required every week for each rank in the Handbook.\n\nPlease note that quota is done automatically by our database, and it resets at around 10:00 PM EST on Saturday evening.`},
      { type: "slide", title: "Logging Hours", content: `Moving on to logging hours. This is how you track how long you’ve been on duty.\n\nEvery time you join the game and are on the Jedi Investigators team, you must begin your shift. Use the /shift manage command in the #droid-commands channel to bring up the control menu. Press “start” to begin your shift, “stop” to end it, and “break” to pause/resume your shift (if you need to go AFK).\n\nIf you have a log that is over 2 hours long, you must have another Investigator vouch for your shift by having them react with a green checkmark to the shift log.\n\nPlease note that if you are caught falsifying shifts, you will be severely punished. However, we understand that mistakes happen, so if you need a shift deleted because you forgot to end your shift by accident, you can submit a shift management notice in #Notices.\n\nYou can also request 0.5 QPs per 30 minutes logged on-duty in the QP Request channel in #notices.`},
      { type: "quiz", questions: [
        { type: "mc", question: "How do you get another Investigator to vouch for shifts over 2 hours?", options:["They say it in chat.","They react with a green checkmark to the shift log.","They message you privately.","No vouch is needed."], answer:1 },
        { type: "mc", question: "What is the quota for LRs?", options:["2 QPs.","3 QPs","5 QPs","There is no quota."], answer:0 },
        { type: "mc", question: "Where can you request QPs for logging hours?", options:["You can't","Merit Requests","QP Requests in #notices"], answer:2 }
      ]},
      { type: "slide", title: "Inactivity Notice Policy", content: `Moving on to our Inactivity Notice Policy, which explains the regulations for taking time away from the game and your duties as an Investigator.\n\nThere are two types of inactivity: Partial and Full. Both require a minimum duration of one week.\n\nDuring a Partial IN, you are still expected to complete your duties, but your weekly quota is cut in half. The max duration for a partial IN is 4 weeks.\n\nDuring a Full IN, you are not expected to complete any duties, so your weekly quota is set to 0. However, you may not request rank-ups, medals, trainings, etc. The max duration for a full IN is 2 weeks.\n\nMembers must wait a certain amount of time after an inactivity notice before requesting another. This value is determined by how long you were on a previous Inactivity Notice.`},

let currentTraining = 0;
let currentSection = 0;
let wrongAttempts = 0;
let userName = "";
const app = document.getElementById('app');

function renderNameScreen(){
  app.innerHTML = `
    <div class='title-banner'>Jedi Investigators</div>
    <h2>Enter Your Username</h2>
    <input id="nameInput" placeholder="Your Username" style="padding:10px;width:100%;border-radius:8px;border:none;margin-top:10px;" />
    <button class="btn" onclick="startApp()">Begin Training</button>
  `;
}

function startApp(){
  const val = document.getElementById('nameInput').value.trim();
  if(!val) return;
  userName = val;
  renderMenu();
}

function renderMenu(){
  app.innerHTML = `
    <div class='title-banner'>Jedi Investigators</div>
    <h2>Select Training</h2>
  `;

  trainings.forEach((t,i)=>{
    const btn = document.createElement('button');
    btn.textContent = t.title;
    btn.className='btn';
    btn.onclick = ()=>{ currentTraining=i; currentSection=0; wrongAttempts=0; renderSection(); };
    app.appendChild(btn);
  });
}

function renderSection(){
  const section = trainings[currentTraining].sections[currentSection];

  if(section.type === 'slide'){
    const formatted = (section.content || '').replace(/\n/g, '<br>');
    app.innerHTML = `
      <div class='title-banner'>Jedi Investigators</div>
      <h1>${section.title || ''}</h1>
      ${section.images ? `<div class="image-grid">${section.images.map(img=>`<img src="${img}">`).join('')}</div>` : ''}
      <p>${formatted}</p>

      ${currentSection > 0 ? `<button class='btn' onclick='prevSection()'>Back</button>` : ''}
      <button class='btn' onclick='nextSection()'>Next</button>
    `;
  } else if(section.type === 'quiz'){
    renderQuiz(section.questions);
  }
}

function renderQuiz(questions){
  app.innerHTML = '<div class="title-banner">Jedi Investigators</div><h2>Quiz</h2>';

  questions.forEach(q => q.correctlyAnswered = false);

  questions.forEach((q)=>{
    const div = document.createElement('div');
    div.innerHTML = `<p>${q.question}</p>`;

    if(q.type === 'mc'){
      q.options.forEach((opt,i)=>{
        const btn = document.createElement('div');
        btn.textContent = opt;
        btn.className = 'option';
        btn.onclick = ()=>{
          const siblings = div.querySelectorAll('.option');
          siblings.forEach(s => s.classList.remove('correct','wrong'));

          if(i === q.answer){
            btn.classList.add('correct');
            q.correctlyAnswered = true;
          } else {
            btn.classList.add('wrong');
            q.correctlyAnswered = false;
            wrongAttempts++;
          }
          checkQuizCompletion(questions);
        };
        div.appendChild(btn);
      });
    }

    if(q.type === 'order'){
      const pool = document.createElement('div');
      const drop = document.createElement('div');

      pool.className = 'dropzone';
      drop.className = 'dropzone';
      drop.textContent = 'Drop in order here';

      let placed = [];

      q.items.forEach(text=>{
        const item = document.createElement('div');
        item.textContent = text;
        item.className = 'draggable';
        item.draggable = true;
        item.ondragstart = e=> e.dataTransfer.setData('text', text);
        pool.appendChild(item);
      });

      drop.ondragover = e=> e.preventDefault();
      drop.ondrop = e=>{
        const data = e.dataTransfer.getData('text');
        placed.push(data);

        const el = document.createElement('div');
        el.textContent = data;
        el.className = 'draggable';
        drop.appendChild(el);

        if(placed.length === q.answer.length){
          const correct = placed.every((v,i)=>v === q.answer[i]);
          if(correct){
            drop.style.borderColor = 'var(--branch-yellow)';
            q.correctlyAnswered = true;
          } else {
            drop.style.borderColor = 'red';
            drop.innerHTML = 'Incorrect order, retry.';
            placed = [];
            q.correctlyAnswered = false;
            wrongAttempts++;
          }
          checkQuizCompletion(questions);
        }
      };

      div.appendChild(pool);
      div.appendChild(drop);
    }

    app.appendChild(div);
  });

  if(currentSection > 0){
    const backBtn = document.createElement('button');
    backBtn.textContent = 'Back';
    backBtn.className = 'btn';
    backBtn.onclick = prevSection;
    app.appendChild(backBtn);
  }

  const nextBtn = document.createElement('button');
  nextBtn.textContent = 'Continue';
  nextBtn.className='btn';
  nextBtn.disabled = true;
  nextBtn.id = 'nextBtn';
  nextBtn.onclick = nextSection;
  app.appendChild(nextBtn);
}

function checkQuizCompletion(questions){
  const allCorrect = questions.every(q=>q.correctlyAnswered === true);
  document.getElementById('nextBtn').disabled = !allCorrect;
}

function nextSection(){
  currentSection++;
  if(currentSection >= trainings[currentTraining].sections.length){
    showCertificate();
  } else {
    renderSection();
  }
}

function prevSection(){
  if(currentSection > 0){
    currentSection--;
    renderSection();
  }
}

function showCertificate(){
  const trainingName = trainings[currentTraining].title;

  const now = new Date();
  const date = now.toLocaleDateString();
  const time = now.toLocaleTimeString();

  app.innerHTML = `
    <div class='certificate'>
      <div class='title-banner'>Jedi Investigators Certification</div>
      <h1>Certificate of Completion</h1>
      <p>Congratulations <b>${userName}</b></p>
      <p>You have successfully completed:</p>
      <h2>${trainingName}</h2>

      <p><b>Date:</b> ${date}</p>
      <p><b>Time:</b> ${time}</p>
      <p><b>Take a screenshot to use in your rank up request.</b></p>

      <p class="hidden-counter">${wrongAttempts}</p>

      <button class='btn' onclick='renderMenu()'>Back</button>
    </div>
  `;
}

renderNameScreen();
</script>
